/**
 * CI/CD Configuration for GitHub Actions
 */

name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: |
          cd crypto-exchange-integration
          npm ci

      - name: Build
        run: |
          cd crypto-exchange-integration
          npm run build

      - name: Run tests
        run: |
          cd crypto-exchange-integration
          npm run test

      - name: Type check
        run: |
          cd crypto-exchange-integration
          npm run type-check

      - name: Lint
        run: |
          cd crypto-exchange-integration
          npm run lint

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./crypto-exchange-integration/coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Install dependencies
        run: |
          cd crypto-exchange-integration
          npm ci

      - name: Security audit
        run: |
          cd crypto-exchange-integration
          npm audit --audit-level=moderate

      - name: SAST scan
        run: |
          cd crypto-exchange-integration
          npx eslint src/**/*.ts --format json > eslint-report.json || true

  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Check documentation
        run: |
          cd crypto-exchange-integration
          [ -f README.md ] && [ -f ADVANCED_FEATURES.md ] && echo "Documentation check passed" || exit 1

  deploy:
    runs-on: ubuntu-latest
    needs: [build, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 20.x

      - name: Build
        run: |
          cd crypto-exchange-integration
          npm ci
          npm run build

      - name: Generate docs
        run: |
          cd crypto-exchange-integration
          npm run build

      - name: Create GitHub release
        uses: actions/create-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          body: |
            ## Changes in this Release
            - Multi-exchange integration
            - Advanced trading features
            - Dogecoin automation
          draft: false
          prerelease: false
